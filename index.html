<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrea Méndez Marí — Portafolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body {
            background-color: #0a0a0a;
            color: #f5f5f7;
            font-family: sans-serif;
            overflow-x: hidden;
            position: relative;
        }
        /* Grano Analógico */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0.04;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        /* Cursor Círculo */
        #custom-cursor {
            width: 30px; height: 30px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.08s ease-out;
        }
        /* Hero */
        .hero {
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5vw;
        }
        .huge-title {
            font-size: 10vw;
            font-weight: 900;
            line-height: 0.85;
            text-transform: uppercase;
            font-family: 'Arial Black', sans-serif;
            letter-spacing: -0.04em;
        }
        .manifesto {
            margin-top: 4vh;
            max-width: 450px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #86868b;
            font-family: 'Courier New', Courier, monospace;
        }
        /* Bento Grid */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            padding: 0 5vw 10vh 5vw;
        }
        .bento-item {
            background-color: #141414;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 40px;
            min-height: 300px;
            display: flex;
            align-items: flex-end;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bento-item.large { grid-column: span 2; min-height: 450px; }
        .project-info h3 {
            font-family: 'Arial Black', sans-serif;
            font-size: 2rem;
            letter-spacing: -0.02em;
            margin-bottom: 5px;
        }
        .project-info p {
            color: #86868b;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
        }
        .bento-item:hover {
            transform: translateY(-5px);
            border-color: #f5f5f7;
            background-color: #1f1f23;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <section class="hero">
        <h1 class="huge-title">Andrea<br>Méndez<br>Marí</h1>
        <p class="manifesto">Creativa multidisciplinar. Diseñando conceptos analógicos, identidades visuales y experiencias digitales de vanguardia.</p>
    </section>

    <section class="bento-grid">
        <div class="bento-item large">
            <div class="project-info">
                <h3>CATBOX</h3>
                <p>Packaging & Branding Conceptual</p>
            </div>
        </div>
        <div class="bento-item">
            <div class="project-info">
                <h3>KM 0</h3>
                <p>Diseño Editorial & Epub</p>
            </div>
        </div>
        <div class="bento-item">
            <div class="project-info">
                <h3>CB HOYO COLLAB</h3>
                <p>Animación Web & Contenido Digital</p>
            </div>
        </div>
    </section>

    <script>
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
