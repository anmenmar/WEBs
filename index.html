<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrea Méndez Marí — Portafolio</title>
    <style>
        /* Estilos base del ADN Visual 2026 */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body {
            background-color: #0a0a0a;
            color: #f5f5f7;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            position: relative;
        }
        /* Efecto Grano Analógico en Movimiento */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0.04;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        /* El Cursor Custom (Círculo) */
        #custom-cursor {
            width: 30px;
            height: 30px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.1s ease-out;
        }
        /* Tipografía Gigante (Hero) */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5vw;
        }
        .huge-title {
            font-size: 10vw;
            font-weight: 900;
            line-height: 0.85;
            text-transform: uppercase;
            font-family: 'Arial Black', sans-serif;
            letter-spacing: -0.04em;
        }
        .manifesto {
            margin-top: 5vh;
            max-width: 450px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #86868b;
        }
    </style>
</head>
<body>

    <!-- Elemento del cursor -->
    <div id="custom-cursor"></div>

    <!-- Zona de Bienvenida -->
    <section class="hero">
        <h1 class="huge-title">Andrea<br>Méndez<br>Marí</h1>
        <p class="manifesto">Creativa multidisciplinar. Diseñando conceptos analógicos, identidades visuales y experiencias digitales de vanguardia.</p>
    </section>

    <script>
        // Lógica para que el círculo siga al ratón de forma fluida
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
